<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Driven Web Engineering</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
            color:white;
            padding:40px;
        }

        .container{
            max-width:900px;
            width:100%;
            text-align:center;
        }

        h1{
            font-size:3rem;
            margin-bottom:15px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:40px;
            font-size:1.1rem;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:25px;
        }

        .card{
            background:#ffffff15;
            backdrop-filter:blur(10px);
            border-radius:15px;
            padding:30px;
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            background:#ffffff25;
        }

        .card h2{
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            padding:12px 24px;
            border-radius:8px;
            text-decoration:none;
            background:#3b82f6;
            color:white;
            font-weight:bold;
            transition:.3s;
        }

        .btn:hover{
            background:#2563eb;
        }

        footer{
            margin-top:50px;
            color:#94a3b8;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🚀 AI-Driven Web Engineering</h1>

    <p>
        My Programming Hero course projects and assignments.
    </p>

    <div class="grid">

        <div class="card">
            <h2>🌐 1st Project</h2>
            <p>HTML Practice Project</p>
            <a class="btn" href="./1st%20Project/">Open Project</a>
        </div>

        <div class="card">
            <h2>🎨 2nd Project - CSS</h2>
            <p>CSS Practice Project</p>
            <a class="btn" href="./2nd%20Project-css/">Open Project</a>
        </div>

        <div class="card">
            <h2>💼 Portfolio Website</h2>
            <p>Personal Portfolio</p>
            <a class="btn" href="./Portfolio%20Website/">Open Project</a>
        </div>

    </div>

    <footer>
        <p>Made with ❤️ by Nahid Hasan</p>
    </footer>

</div>

</body>
</html>
